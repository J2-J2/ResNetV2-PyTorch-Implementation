model:
  name: resnet50
  n_class: 10
  inner_c_list: [64, 128, 256, 512] # 각 block 마다 내부 채널 설정 -> 4배 크게 출력됨

data:
  name: imagenette
  train_dir: data/data_imagenette/
  val_dir: data/data_imagenette/
  image_size: 224
  batch_size: 64
  num_workers: 4
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]
  inference_dir: data/data_imagenette/imagenette2/val/n01440764

train:
  epochs: 30
  lr: 0.01
  momentum: 0.9
  weight_decay: 0.0001
  use_amp: true
  
scheduler:
  name: multistep

save:
  checkpoint_dir: results
  best_model_name: best_resnet50.pth